<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Applicativo Prenotazione — LUMEN</title>
<style>
  body { font-family: Georgia, serif; background: #0d0d0d; color: #eee; margin: 0; padding: 40px 20px; }
  .box { max-width: 480px; margin: 0 auto; background: #1a1a1a; padding: 30px; border-left: 4px solid #c9a84c; }
  h1 { color: #c9a84c; letter-spacing: 3px; margin-top: 0; }
  label { display: block; margin-top: 15px; color: #c9a84c; font-size: 0.9rem; }
  input, select { width: 100%; padding: 10px; margin-top: 5px; background: #000; color: #eee; border: 1px solid #444; font-family: inherit; }
  button { margin-top: 20px; width: 100%; background: #c9a84c; color: #000; padding: 12px; border: none; cursor: pointer; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
  #esito { margin-top: 20px; padding: 15px; border-radius: 0; }
  .ok { background: #1e3a1e; color: #9fdf9f; border-left: 4px solid #4caf50; }
  .err { background: #3a1e1e; color: #ff9999; border-left: 4px solid #e53935; }
  a { color: #c9a84c; font-size: 0.85rem; }
</style>
</head>
<body>
  <div class="box">
    <h1>PRENOTAZIONE</h1>
    <p><a href="../../SITO_HTML/index.html">← Torna al sito</a></p>
    <form id="form">
      <label>Nome cliente
        <input type="text" id="nome" required>
      </label>
      <label>Numero di biglietti
        <input type="number" id="biglietti" min="1" value="1" required>
      </label>
      <label>Orario dello spettacolo
        <input type="text" id="orario" placeholder="es. 18:00" required>
      </label>
      <button type="submit">Prenota</button>
    </form>
    <div id="esito"></div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
